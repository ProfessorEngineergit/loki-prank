name: build

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build-test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Show Swift version
        run: swift --version
      - name: Build
        run: swift build
      - name: Test
        run: swift test
      - name: Package .app
        run: ./scripts/build-app.sh release
      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: Loki.app
          path: build/Loki.app
